<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mickey Premium Exam Portal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary-blue: #1a2b4c; --success-green: #2ecc71; --error-red: #e74c3c; --accent-purple: #9b59b6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; user-select: none; -webkit-user-select: none; }
        
        /* Error Screen */
        #lock-screen { display: none; text-align: center; margin-top: 100px; padding: 20px; font-weight: bold; font-size: 1.2em; color: var(--error-red); }
        
        /* Main UI */
        #app-content { display: none; }
        .header { background: var(--primary-blue); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #f39c12; }
        .timer-container { background: var(--error-red); padding: 5px 15px; border-radius: 4px; font-weight: bold; letter-spacing: 1px; }
        .main-layout { display: flex; flex-wrap: wrap; padding: 15px; gap: 15px; }
        
        .question-section { flex: 1 1 60%; background: white; border-radius: 8px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); min-height: 350px; }
        .palette-section { flex: 1 1 30%; background: white; border-radius: 8px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .palette-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 10px; margin-top: 15px; }
        .q-circle { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 0.9em; font-weight: bold; cursor: pointer; }
        .answered { background: var(--success-green); color: white; border: none; }
        .marked { background: var(--accent-purple); color: white; border: none; }
        .unanswered { background: var(--error-red); color: white; border: none; }
        
        .footer { text-align: center; padding: 15px; margin-top: 20px; font-size: 0.85em; color: #7f8c8d; background: white; border-top: 1px solid #eee; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="lock-screen">
        🚫 ACCESS DENIED 🚫<br><br>
        <span style="color: #333; font-size: 0.9em;">Please open this test inside Mickey's Official Telegram Bot.</span>
    </div>

    <div id="app-content">
        <div class="header">
            <div>Professional Exam Interface | Mock Test</div>
            <div class="timer-container">⏱️ 45:00</div>
        </div>

        <div class="main-layout">
            <div class="question-section">
                <h3 style="color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px;">Question 1</h3>
                <p style="font-size: 1.1em; color: #333;" id="welcome-text">Loading encrypted question data...</p>
                
                <div style="margin-top: 25px;">
                    <label><input type="radio" name="opt"> Option A</label><br><br>
                    <label><input type="radio" name="opt"> Option B</label><br><br>
                    <label><input type="radio" name="opt"> Option C</label><br><br>
                    <label><input type="radio" name="opt"> Option D</label>
                </div>
            </div>

            <div class="palette-section">
                <h4 style="margin-top: 0; color: var(--primary-blue);">Question Palette</h4>
                <div class="palette-grid">
                    <div class="q-circle answered">1</div>
                    <div class="q-circle unanswered">2</div>
                    <div class="q-circle marked">3</div>
                    <div class="q-circle">4</div>
                    <div class="q-circle">5</div>
                </div>
            </div>
        </div>

        <div class="footer">
            Secure Platform © Designed by <b>@PureSoul222</b> | Pro Scorecard System Active
        </div>
    </div>

    <script>
        // PC par crash rokne ke liye DOMContentLoaded use kiya hai
        document.addEventListener("DOMContentLoaded", function() {
            const tg = window.Telegram.WebApp;
            
            tg.ready(); // CRITICAL: Tells Telegram that WebApp is ready to be displayed
            tg.expand(); // Full screen

            // Block Copy/Paste Shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u' || e.key === 'p' || e.key === 's')) { e.preventDefault(); }
            });

            // Verification Logic
            if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
                // Not in Telegram
                document.getElementById('lock-screen').style.display = 'block';
            } else {
                // In Telegram
                document.getElementById('app-content').style.display = 'block';
                const user = tg.initDataUnsafe.user;
                document.getElementById('welcome-text').innerHTML = `Hello <b>${user.first_name}</b>, tumhara RRB PO Level Test ready hai. All the best!`;
            }
        });
    </script>
</body>
</html>
